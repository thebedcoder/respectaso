services:
  web:
    build: .
    container_name: respectaso-web
    ports:
      - "80:8080"
    volumes:
      - aso_data:/app/data
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-}
    networks:
      - respectaso_net

volumes:
  aso_data:

networks:
  respectaso_net:
    name: respectaso_net
    driver: bridge
    attachable: true
