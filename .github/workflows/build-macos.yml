name: Build macOS App

# Manual trigger only — we sign locally for now
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Collect static files
        run: |
          export SECRET_KEY="build-only-key"
          python manage.py collectstatic --noinput

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        run: pyinstaller desktop/RespectASO.spec --noconfirm

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12

          # Create temporary keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          # Import certificate
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain

          # Clean up
          rm certificate.p12

      - name: Sign the app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="dist/RespectASO.app"

          # Sign all binaries inside the app bundle (deep sign)
          codesign --deep --force --verify --verbose \
            --sign "Developer ID Application: $APPLE_TEAM_ID" \
            --options runtime \
            --entitlements desktop/entitlements.plist \
            "$APP_PATH"

          # Verify
          codesign --verify --deep --strict "$APP_PATH"

      - name: Create DMG
        run: |
          # Install create-dmg
          brew install create-dmg

          # Build DMG with drag-to-Applications layout
          create-dmg \
            --volname "RespectASO" \
            --volicon "desktop/assets/RespectASO.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "RespectASO.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "RespectASO.app" \
            "RespectASO-${{ steps.version.outputs.version }}-macOS.dmg" \
            "dist/RespectASO.app"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="RespectASO-${{ steps.version.outputs.version }}-macOS.dmg"

          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG"

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG="RespectASO-${{ steps.version.outputs.version }}-macOS.dmg"
          gh release upload "$GITHUB_REF_NAME" "$DMG" --clobber

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
